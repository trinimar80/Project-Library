name: DevSecOps Pipeline

on:
  push:
    branches:
      - '**'          # Esto ejecuta el pipeline en PUSH a CUALQUIER rama
  pull_request:
    branches:
      - develop
      - main

jobs:
  sast:
    name: SAST with Bandit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r . -f json -o bandit_report.json
        continue-on-error: true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report-${{ github.ref_name }}
          path: bandit_report.json

  dast-graybox:
    name: DAST Gray Box (ZAP with Auth)
    runs-on: ubuntu-latest
    if: github.ref_name == 'develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start application
        run: |
          docker compose up -d --build
          sleep 30

      - name: Run ZAP Scan
        uses: zaproxy/action-full-scan@v0.9.0
        with:
          target: 'http://localhost:5000'
          cmd_options: '-a -r zap_report.html'

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap-graybox-report
          path: zap_report.html
