name: DevSecOps Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - develop
      - master

jobs:
  # SAST con Bandit - Se ejecuta en TODOS los eventos
  sast:
    name: SAST with Bandit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r . -f json -o bandit_report.json
        continue-on-error: true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report-${{ github.ref_name }}
          path: bandit_report.json

  # DAST Black Box (ZAP) - Solo en push a master
  dast-blackbox:
    name: DAST Black Box (ZAP)
    runs-on: ubuntu-latest
    if: github.ref_name == 'master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start application with Docker Compose
        run: |
          docker-compose up -d --build
          sleep 30

      - name: Run ZAP Black Box Scan
        uses: zaproxy/action-full-scan@v0.9.0
        with:
          target: 'http://localhost:5000'
          cmd_options: '-a -r blackbox_report.html'

      - name: Upload ZAP Black Box report
        uses: actions/upload-artifact@v4
        with:
          name: zap-blackbox-report
          path: blackbox_report.html

  # DAST Gray Box (ZAP con autenticación) - Solo en push a develop o PR
  dast-graybox:
    name: DAST Gray Box (ZAP with Auth)
    runs-on: ubuntu-latest
    if: github.ref_name == 'develop' || github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start application with Docker Compose
        run: |
          docker-compose up -d --build
          sleep 30

      - name: Login and get session cookie
        id: login
        run: |
          COOKIE=$(curl -s -c - -X POST http://localhost:5000/login \
            -d "username=seminar_user&password=Toro1234" \
            | grep -E '^localhost\s+FALSE\s+/\s+FALSE\s+0\s+session\s+' \
            | awk '{print $NF}')
          echo "session_cookie=$COOKIE" >> $GITHUB_OUTPUT

      - name: Run ZAP Gray Box Scan
        uses: zaproxy/action-full-scan@v0.9.0
        with:
          target: 'http://localhost:5000'
          cmd_options: '-a -r graybox_report.html -Z "session=${{ steps.login.outputs.session_cookie }}"'

      - name: Upload ZAP Gray Box report
        uses: actions/upload-artifact@v4
        with:
          name: zap-graybox-report
          path: graybox_report.html
